name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Stáhne tvůj kód do virtuálního stroje GitHubu
    - uses: actions/checkout@v4

    # 2. Nastaví Javu 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Zkompiluje aplikaci a spustí testy přes Maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # 4. Uloží vygenerovaný JAR soubor jako Artifact (uvidíš ho na webu GitHubu)
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: spring-boot-app-jar
        path: target/*.jar
        retention-days: 5

    - name: Build Docker image
      run: docker build -t my-app:${{ github.sha }} .
