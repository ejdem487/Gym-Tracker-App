spring:
  application:
    name: gym-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/gymtrackerdb
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}